# Brika local dev stack. Run with `bun run up` (or `mortar` directly).
#
# Three services:
#
#   • signaling — Cloudflare-Worker coordinator + bootstrap SPA, served
#     by Vite + miniflare. Hub talks to this for remote-access claims
#     and WebSocket signaling.
#   • ui        — the Brika UI Vite dev server. Hub proxies it during
#     dev so you get HMR through the hub origin.
#   • hub       — the Brika hub. Depends on both: coordinator URL for
#     signaling, dev-proxy URL for the UI.
#
# `cwd:` + `bun run dev` is preferred over `bun --filter <pkg>` —
# `--filter` uses terminal redraws for its task-progress UI which
# stack as duplicate frames when its stdout is piped (which is how
# mortar captures logs).

services:
  signaling:
    label: Signaling
    cwd: apps/signaling
    command: bun run dev
    port: 5174

  ui:
    label: Brika UI
    cwd: apps/ui
    command: bun run dev
    port: 5173

  hub:
    label: Brika Hub
    cwd: apps/hub
    command: bun run dev
    port: 3001
    env:
      # Pin hub's runtime data dir to the repo root so it doesn't land
      # under apps/hub/.brika/. `${root}` expands to the directory
      # containing this mortar.yml.
      BRIKA_HOME: ${root}/.brika
      BRIKA_COORDINATOR_URL: http://localhost:5174
      BRIKA_DEV_UI_PROXY: http://localhost:5173
      BRIKA_DEV_AUTOCLAIM: devhub
      # Opt into the auth-gated /api/i18n/sources write endpoint so the
      # devtools overlay can edit translations on disk. Off by default in
      # production binaries (the endpoint returns NotFound) so shipped
      # builds never expose file paths or accept JSON writes over HTTP.
      BRIKA_ALLOW_I18N_EDITS: "1"
      # Point the hub at the dev source files instead of the embedded
      # archive — `rootDir` derives from BRIKA_HOME and would otherwise
      # land on `${root}/locales` (doesn't exist), so writes can't find
      # an on-disk source. Production binaries omit this and use the
      # archive as a read-only fallback.
      BRIKA_LOCALES_DIR: ${root}/apps/hub/src/locales
      # Mock the update flow without hitting GitHub. Uncomment one
      # scenario to demo /setup/update + the settings update dialog.
      # See apps/hub/README.md → "Dev-only update mock". Scenarios:
      #   available | dev-build | channel-mismatch | up-to-date | apply-error
      # `force-real-install` is the only one that runs the REAL binary
      # swap against GitHub — use sparingly.
      BRIKA_DEV_FAKE_UPDATE: available
      # BRIKA_DEV_FAKE_UPDATE_DELAY_MS: 250
    dependsOn: [signaling, ui]
