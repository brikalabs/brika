# SonarQube Project Configuration
sonar.projectKey=brikalabs_brika
sonar.organization=brikalabs

# Project metadata
sonar.projectName=brika
sonar.projectVersion=0.2.1

# Source code paths (monorepo structure)
sonar.sources=apps,packages,plugins
sonar.tests=apps,packages,plugins

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# ─── Analysis exclusions ─────────────────────────────────────────────────────
# Files Sonar shouldn't analyze at all. Includes tests (analyzed via tests=),
# build output, scaffold templates, and Clay's visual `.tsx` components
# (shadcn-derived wrappers without unit tests — analysis just produces noise).
# Their `.ts` siblings (`tokens.ts`, `meta.ts`, `index.ts`) and everything
# under `packages/clay/src/{tokens,themes,primitives}/` stay in scope.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/.cache/**,\
  packages/create-brika/template/**,\
  packages/clay/src/**/*.tsx

# ─── Coverage exclusions ─────────────────────────────────────────────────────
# Files that ARE analyzed but don't need unit-test coverage. Grouped by reason
# so each category can be reviewed independently when the layout changes.

# 1. Pure frontend / docs apps — covered by e2e or visual review, not unit tests.
# 2. Bootstrap shell + service worker — browser-only (WebRTC, DOM, Cache API,
#    ServiceWorkerGlobalScope), can't execute in the Bun test runner.
# 3. Cloudflare Worker entry + Durable Object + D1 store — workerd-only;
#    needs miniflare to run, integration territory not unit-test territory.
# 4. Hub remote-access network glue — opens real sockets / werift WebRTC peers.
#    The pure logic they consume (translateFrom*, hub-resolution,
#    parseTransportHeader, RpcServer, SessionService, ConnectionTypeSchema)
#    IS unit-tested under @brika/remote-access-protocol, @brika/auth,
#    @brika/signaling (server/__tests__), and apps/hub (remote-access/__tests__).
# 5. React tree mounts, providers, and OS-keychain access — DOM / system
#    side-effects without testable pure logic.
# 6. Plugin packages, scaffold templates, build scripts (apps/build —
#    Bun.build orchestration + stub plugins; packages/workspace-tools —
#    release scripts driving the npm publish + version bump flow),
#    benchmarks, examples.
# 7. Mortar TUI rendering layer — Ink terminal output, manual-test surface.
# 8. CLI entrypoints — argv parsing thin wrappers around tested services.
#    Includes hub bootstrap plugins that just wire DI (`bootstrap/plugins/
#    updates.ts`, `bootstrap/plugins/remote-access.ts`) — the registered
#    services themselves (UpdateService, UpdateProvider, RemoteAccessService)
#    are unit-tested separately.
# 9. Plugin process prelude + lockdown — code that only executes inside
#    spawned plugin subprocesses (`bun --preload`). Coverage is exercised
#    end-to-end by `prelude.test.ts` (5 cases), `lockdown-redteam.test.ts`
#    (12 cases) and `lockdown-unit.test.ts` (12 cases), each of which
#    spawns a fresh Bun subprocess; bun:test's coverage instrumentation
#    does not cross spawn boundaries so the lines never register in lcov.
# 10. Self-updater mechanism (`runtime/updates/updater.ts`) — GitHub-release
#    download, archive extraction, minisign verification, cross-platform
#    binary swap and staged install. Exercised by ~129 integration tests
#    (updater*.test.ts), but the OS/network/filesystem branches can't run in
#    the Bun test runner (same "integration territory" rationale as #3/#8).
#    `helpers/**` holds test-only mocks (BunSecrets, fs-watch), not product code.
# 11. Net-grant fetch path (grants/net/{perform,redirect,index}.ts and the sdk
#    grants/net.ts schema). Unit-tested to 96-100% locally via net.test.ts,
#    audit.test.ts and fetch-proxy.test.ts (every new line is hit). CI's
#    `bun test --parallel` coverage runner deterministically drops the per-line
#    attribution for these files: a worker that imports them transitively
#    without exercising them overwrites the lcov hits, so Sonar sees ~33-67%.
#    A serial coverage pass would measure them correctly but is not viable here,
#    the hub suite depends on `--parallel` process isolation (tests invoke real
#    process.exit and leak module mocks across files when run in one process).
#    Excluded from the coverage gate, NOT from testing.
# 12. Workflow brick-rendering build/spawn glue. Same documented categories as
#    above, for the new module/block-view pipeline. (The sdk block-views.ts /
#    brick-views.ts bridge stubs are NOT here: their throw-paths are unit-tested
#    by block-views.test.ts / brick-views.test.ts and merge cleanly.)
#    - compiler compile-client.ts / compile-server.ts and the hub
#      module-compiler.ts: thin Bun.build orchestration; exercised by the
#      *.integration.test.ts suites with real builds, but the failure branches
#      need a failing Bun.build = integration territory, not unit (cf. #3/#10).
#    - sandbox macos-profile.ts: pure SBPL builder, 100% covered by
#      macos-profile.test.ts in isolation, but a sibling sandbox test imports
#      it and CI's `--parallel` runner drops the per-line attribution (#11).
#    - plugin-lifecycle.ts: plugin spawn + hot-reload watcher orchestration;
#      the new lines are the raw-socket spawn-env (parallel-dropped, covered by
#      plugin-lifecycle-mock.test.ts) and the watcher-driven brick live-swap
#      (file-watch integration). Excluded from the gate, NOT from testing.
