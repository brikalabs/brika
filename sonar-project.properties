# ─── Duplication exclusions ──────────────────────────────────────────────────
# apps/cli/src/cli/completions.ts is a near-identical sibling of the long-
# established apps/hub/src/cli/completions.ts — both are brika-specific shell-
# script generators (hardcoded `.brika/completions/brika.<shell>`, marker
# strings, fish/zsh/bash emitters). Extracting them into a shared package is
# planned but out of scope for the CLI-TUI introduction; mark the new copy as
# CPD-exempt so we don't block the gate on a refactor that needs its own PR.
sonar.cpd.exclusions=\
  apps/cli/src/cli/completions.ts

# Coverage report paths (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Fail the workflow if the quality gate fails
sonar.qualitygate.wait=true

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=ts
