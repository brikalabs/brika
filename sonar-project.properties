# SonarQube Project Configuration
sonar.projectKey=brikalabs_brika
sonar.organization=brikalabs

# Project metadata
sonar.projectName=brika
sonar.projectVersion=0.2.1

# Source code paths (monorepo structure)
sonar.sources=apps,packages,plugins
sonar.tests=apps,packages,plugins

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude patterns (exclude node_modules, dist, tests, cache, scaffold templates,
# and Clay's `.tsx` React components — they're shadcn-derived visual wrappers
# without unit tests, so analysis would only produce noise. Their `.ts`
# siblings — `tokens.ts`, `meta.ts`, `index.ts`, plus everything under
# `packages/clay/src/{tokens,themes,primitives}/` — stay in scope.)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/.cache/**,packages/create-brika/template/**,packages/clay/src/**/*.tsx

# Coverage exclusions — frontend apps + untestable infrastructure don't need
# unit-test coverage. For Clay specifically, the per-component `tokens.ts` /
# `meta.ts` / `index.ts` files are config + barrel re-exports that don't
# warrant unit tests; the actual logic lives in `packages/clay/src/tokens/`,
# `themes/`, and `primitives/`, which DO contribute to the coverage budget
# via `packages/clay/src/__tests__/` and the per-module test files.
#
# Remote-access infrastructure that legitimately can't run under the Bun test
# runner is excluded too:
#   - signaling Worker entry + Durable Object (workerd-only — DO state,
#     WebSocket upgrade, miniflare bindings)
#   - signaling bootstrap `src/_boot/**` (browser-only — WebRTC handshake,
#     DOM-mounted React, MutationObserver-driven script swap, Cache API)
#   - signaling SW source (`sw/**` — ServiceWorkerGlobalScope, only runs
#     in a browser SW context)
#   - the WebSocket signaling client + werift WebRTC peer-session wrapper
# The pure logic those modules consume (tickets, claim validation,
# subprotocol parsing, hub-resolution, route translation, header parsing,
# RpcServer) is unit-tested in @brika/remote-access-protocol, @brika/auth,
# @brika/signaling (server/__tests__), and apps/hub (remote-access/__tests__).
sonar.coverage.exclusions=apps/ui/**/*,apps/docs/**/*,apps/clay-docs/**/*,apps/registry/**/*,apps/schema-cdn/**/*,apps/website/**/*,apps/signaling-worker/**/*,apps/signaling-bootstrap/**/*,apps/signaling/src/**/*,apps/signaling/sw/**/*,apps/signaling/server/worker.ts,apps/signaling/server/hub-session.ts,apps/signaling/server/env.ts,apps/signaling/server/claims-d1.ts,apps/hub/src/runtime/http/api-server.ts,apps/hub/src/runtime/secrets/secret-store.ts,apps/hub/src/runtime/remote-access/signaling-client.ts,apps/hub/src/runtime/remote-access/peer-session.ts,apps/hub/src/runtime/remote-access/remote-access-service.ts,apps/hub/src/runtime/http/routes/remote-access.ts,apps/hub/src/runtime/http/embedded-ui.ts,apps/hub/src/runtime/http/dev-ui-proxy.ts,apps/hub/src/runtime/bootstrap/plugins/remote-access.ts,apps/hub/src/runtime/config/brika-initializer.ts,packages/components/src/brika-mark/**/*,plugins/**/*,**/__benchmarks__/**,**/examples/**,**/scripts/**,packages/create-brika/**/*,apps/hub/compiler/**/*,packages/auth/src/react/**/*,packages/auth/src/tanstack/**/*,packages/auth/src/client/http-client.ts,packages/i18n-dev/src/entry.ts,packages/i18n-dev/src/check.ts,packages/i18n-dev/src/generate-types.ts,packages/i18n-dev/src/vite.ts,packages/i18n-dev/src/overlay/hooks.ts,packages/i18n-dev/src/overlay/highlight.tsx,packages/i18n-dev/src/overlay/runtime-markers.tsx,packages/cli/**/*,packages/clay/src/components/**/*,packages/mortar/src/tui/components/**/*,packages/mortar/src/tui/views/**/*,packages/mortar/src/tui/state/**/*,packages/mortar/src/tui/App.tsx,packages/mortar/src/tui/MortarProvider.tsx,packages/mortar/src/tui/useMortar.ts,packages/mortar/src/tui/routes.ts,packages/mortar/src/tui/keys/useNavigationKeys.ts,packages/mortar/src/tui/keys/useServiceActionKeys.ts,packages/mortar/src/tui/keys/useScrollKeys.ts,packages/mortar/src/tui/keys/useSearchInput.ts,packages/mortar/src/tui/keys/useMainKeybinds.ts,packages/mortar/src/tui/keys/useGlobalQuit.ts,packages/mortar/src/cli.ts,packages/mortar/src/router/Outlet.tsx,packages/mortar/src/router/Provider.tsx,packages/mortar/src/router/useRouter.ts,packages/mortar/src/router/useRouterInstance.ts

# Coverage report paths (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Fail the workflow if the quality gate fails
sonar.qualitygate.wait=true

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=ts
