# ─── Duplication exclusions ──────────────────────────────────────────────────
# apps/console/src/features/version/buildInfo.macro.ts mirrors
# apps/hub/src/build-info.macro.ts — both are tiny Bun-macro helpers that
# wrap `Bun.spawnSync(['git', 'rev-parse', ...])` to inline commit/branch/
# build-date strings at bundle time. Sharing them across packages would
# require crossing the `with { type: 'macro' }` boundary, which is brittle;
# keep one copy per binary and exempt the new console copy from CPD.
#
# apps/signaling/src/_boot/lib/sw-proxy-bridge.ts intentionally mirrors
# apps/ui/src/lib/api/sw-proxy.ts. Both register a `brika:sw-proxy`
# MessageEvent listener and forward through a transport — the bridge
# uses the bootstrap's WebRTC peer, the UI uses the hub-UI Transport.
# Two listeners must coexist because the hub UI's listener is itself a
# transitive ES-module import that needs the bridge alive at fetch
# time (chicken-and-egg). Sharing the body would require either
# coupling `apps/signaling` to `apps/ui`'s Transport type, or hoisting
# a new package for ~80 lines of glue — both worse than the duplication.
sonar.cpd.exclusions=\
  apps/console/src/features/version/buildInfo.macro.ts,\
  apps/signaling/src/_boot/lib/sw-proxy-bridge.ts

# Coverage report paths (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Fail the workflow if the quality gate fails
sonar.qualitygate.wait=true

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=ts
