# SonarQube Project Configuration
sonar.projectKey=brikalabs_brika
sonar.organization=brikalabs

# Project metadata
sonar.projectName=brika
sonar.projectVersion=0.2.1

# Source code paths (monorepo structure)
sonar.sources=apps,packages,plugins
sonar.tests=apps,packages,plugins

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude patterns (exclude node_modules, dist, tests, cache, scaffold templates,
# and Clay's `.tsx` React components — they're shadcn-derived visual wrappers
# without unit tests, so analysis would only produce noise. Their `.ts`
# siblings — `tokens.ts`, `meta.ts`, `index.ts`, plus everything under
# `packages/clay/src/{tokens,themes,primitives}/` — stay in scope.)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/.cache/**,packages/create-brika/template/**,packages/clay/src/**/*.tsx

# Coverage exclusions — frontend apps + untestable infrastructure don't need
# unit-test coverage. For Clay specifically, the per-component `tokens.ts` /
# `meta.ts` / `index.ts` files are config + barrel re-exports that don't
# warrant unit tests; the actual logic lives in `packages/clay/src/tokens/`,
# `themes/`, and `primitives/`, which DO contribute to the coverage budget
# via `packages/clay/src/__tests__/` and the per-module test files.
sonar.coverage.exclusions=apps/ui/**/*,apps/docs/**/*,apps/clay-docs/**/*,apps/registry/**/*,apps/schema-cdn/**/*,apps/website/**/*,plugins/**/*,**/__benchmarks__/**,**/examples/**,**/scripts/**,packages/create-brika/**/*,apps/hub/compiler/**/*,packages/auth/src/react/**/*,packages/auth/src/tanstack/**/*,packages/auth/src/client/http-client.ts,packages/i18n-dev/src/entry.ts,packages/i18n-dev/src/check.ts,packages/i18n-dev/src/generate-types.ts,packages/i18n-dev/src/vite.ts,packages/i18n-dev/src/overlay/hooks.ts,packages/i18n-dev/src/overlay/highlight.tsx,packages/i18n-dev/src/overlay/runtime-markers.tsx,packages/cli/**/*,packages/clay/src/components/**/*

# Coverage report paths (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Fail the workflow if the quality gate fails
sonar.qualitygate.wait=true

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=ts
