# SonarQube Project Configuration
sonar.projectKey=brika
sonar.organization=maxscharwath

# Project metadata
sonar.projectName=brika
sonar.projectVersion=0.2.1

# Source code paths (monorepo structure)
sonar.sources=apps,packages,plugins
sonar.tests=apps,packages,plugins

# Test file patterns
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclude patterns (exclude node_modules, dist, tests, and cache)
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/.cache/**

# Coverage exclusions (exclude frontend apps and untestable infrastructure from coverage requirements)
sonar.coverage.exclusions=apps/ui/**/*,apps/docs/**/*,apps/registry/**/*,apps/schema-cdn/**/*,apps/website/**/*,plugins/**/*,**/__benchmarks__/**,**/examples/**,**/scripts/**,packages/create-brika/**/*,apps/hub/compiler/**/*,packages/auth/src/react/**/*,packages/auth/src/tanstack/**/*,packages/auth/src/client/http-client.ts,packages/i18n-dev/src/entry.ts,packages/i18n-dev/src/check.ts,packages/i18n-dev/src/generate-types.ts,packages/i18n-dev/src/vite.ts,packages/i18n-dev/src/overlay/hooks.ts,packages/i18n-dev/src/overlay/highlight.tsx,packages/i18n-dev/src/overlay/runtime-markers.tsx

# Coverage report paths (LCOV format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8

# Language-specific settings
sonar.language=ts
