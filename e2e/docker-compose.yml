# Verdaccio registry for the npm publish/install acceptance e2e (e2e/acceptance.ts).
# Brought up by the gated `e2e-acceptance` workflow or locally with:
#   docker compose -f e2e/docker-compose.yml up -d
#   bun run e2e/acceptance.ts
#   docker compose -f e2e/docker-compose.yml down -v
services:
  verdaccio:
    image: verdaccio/verdaccio:6
    ports:
      - "4873:4873"
    volumes:
      - ./verdaccio.config.yaml:/verdaccio/conf/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4873/-/ping"]
      interval: 3s
      timeout: 3s
      retries: 20
