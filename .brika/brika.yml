# BRIKA Configuration
# https://elia.dev/docs/configuration

hub:
  port: 3001
  host: 0.0.0.0

plugins:
  installDir: ./plugins/.installed
  heartbeatInterval: 5000
  heartbeatTimeout: 15000

# Installed plugins
# Format: "package-name": "version-specifier"
# Examples:
#   "@brika/plugin-timer": "^1.0.0"      # npm registry
#   "my-plugin": "workspace:*"            # local workspace
#   "my-plugin": "file:./plugins/local"   # file path
install:
  "@brika/plugin-timer": workspace:*
  "@brika/blocks-builtin": workspace:*

# Event-based rules
rules: []

# Scheduled tasks
schedules: []

