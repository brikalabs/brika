name: Setup Bun workspace
description: Install a pinned Bun, restore the install cache, and run a frozen install.

inputs:
  bun-version:
    description: Bun version to install (usually needs.setup.outputs.bun_version).
    required: true

runs:
  using: composite
  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - uses: actions/cache@v5
      with:
        path: ~/.bun/install/cache
        key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
        restore-keys: bun-${{ runner.os }}-

    - run: bun install --frozen-lockfile
      shell: bash
