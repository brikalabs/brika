name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      bun_version: ${{ steps.meta.outputs.bun_version }}
    steps:
      - uses: actions/checkout@v5
      - id: meta
        run: echo "bun_version=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  # Static analysis for the workflow files themselves: syntax, expression
  # errors, needs/outputs wiring, and shellcheck on every `run:` block (the
  # rhysd/actionlint image bundles shellcheck). The fastest "test our CI"
  # signal. Pin to a release tag once a version is confirmed green in CI.
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Lint workflows
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color

  version-gate:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags so the gate can compare against the latest
          # released tag (actions/checkout does not fetch tags by default).
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Unit-test the version-gate logic
        run: bun test scripts/check-version-monotonic.test.ts
      - name: Fail PR if release version regresses below latest tag
        run: bun scripts/check-version-monotonic.ts

  smoke-bin:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      # Pack @brika/sdk and install it into a fixture plugin that depends on ONLY
      # @brika/sdk, proving the bundled `brika` bin is self-contained (no toolchain
      # devDeps leak into a plugin's install closure). This is the gate the whole
      # single-dependency design protects.
      - name: Packed-tarball smoke test
        run: bun run --filter @brika/sdk smoke:bin

  test:
    needs: setup
    runs-on: ubuntu-latest
    # Hard cap: a clean run is ~1 min. If we're past 10 the suite is wedged
    # (typically a leaked plugin subprocess) -- fail fast instead of burning
    # the full 6-hour job ceiling.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so Sonar can do git blame / new-code period analysis.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun scripts/test-ci.ts

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

  sonar:
    name: SonarQube Scan
    needs: [setup, test]
    # Run even when tests fail -- partial coverage is still useful and lets
    # Sonar's quality-gate fire on whatever new code was analysed.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      # Install dependencies so the scanner's TypeScript analyzer can resolve
      # types from node_modules. Without them every external/cross-package type
      # degrades to `any`, which makes type-aware rules (e.g. S4325 redundant
      # assertions, S7785 promise chains on zod's `.catch()`) fire as false
      # positives on code that is actually correct.
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Download coverage report
        uses: actions/download-artifact@v5
        with:
          name: lcov
          path: coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
