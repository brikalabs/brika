name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      bun_version: ${{ steps.meta.outputs.bun_version }}
    steps:
      - uses: actions/checkout@v5
      - id: meta
        run: echo "bun_version=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

  typecheck:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    needs: setup
    runs-on: ubuntu-latest
    # Hard cap: a clean run is ~1 min. If we're past 10 the suite is wedged
    # (typically a leaked plugin subprocess) -- fail fast instead of burning
    # the full 6-hour job ceiling.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so Sonar can do git blame / new-code period analysis.
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          # Each workspace runs in its own bun process so `mock.module()`
          # state can't bleed between workspaces (oven-sh/bun#12823).
          # We fan out across the runner's cores with `xargs -P` and
          # capture per-workspace output to a log file, then emit those
          # logs in deterministic order at the end so the GitHub job
          # output stays readable.
          mkdir -p /tmp/test-logs
          workspaces=()
          for dir in packages/* apps/* plugins/*; do
            [ -f "$dir/package.json" ] || continue
            test_cmd=$(jq -r '.scripts.test // empty' "$dir/package.json")
            [ -n "$test_cmd" ] || continue
            workspaces+=("$dir")
          done

          # Worker: bun's own `bun test` gets `--coverage` appended so we
          # always emit lcov regardless of what the workspace's own test
          # script does. Non-`bun test` scripts (e.g. ones that pre-build)
          # fall through to `bun run test`.
          export -f true 2>/dev/null
          printf '%s\n' "${workspaces[@]}" | xargs -P 4 -I{} bash -c '
            dir="$1"
            slug=$(basename "$dir")
            log="/tmp/test-logs/$slug.log"
            tc=$(jq -r .scripts.test "$dir/package.json")
            case "$tc" in
              "bun test"|"bun test --parallel"|"bun test --parallel "*)
                (cd "$dir" && eval "$tc --timeout=30000 --coverage --coverage-reporter=lcov") > "$log" 2>&1
                ;;
              *)
                (cd "$dir" && bun run test) > "$log" 2>&1
                ;;
            esac
            echo $? > "$log.exitcode"
          ' _ {}

          fail=0
          for dir in "${workspaces[@]}"; do
            name=$(jq -r .name "$dir/package.json")
            slug=$(basename "$dir")
            log="/tmp/test-logs/$slug.log"
            ec=$(cat "$log.exitcode" 2>/dev/null || echo 1)
            echo "::group::Testing $name (exit=$ec)"
            cat "$log" 2>/dev/null || true
            echo "::endgroup::"
            [ "$ec" != "0" ] && fail=1
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more workspaces had failing tests."
          fi
          # Always merge lcov so the sonar job has a report even on partial failure.
          # Each workspace's lcov has `SF:` paths relative to ITS root, so we
          # prefix with the workspace dir and collapse any leading `..` segments
          # to get a single fully-repo-relative report at coverage/lcov.info.
          mkdir -p coverage
          : > coverage/lcov.info
          find . -path '*/coverage/lcov.info' ! -path './coverage/*' -print0 \
            | while IFS= read -r -d '' lcov; do
                ws=$(dirname "$(dirname "$lcov")")
                ws="${ws#./}"
                awk -v ws="$ws" '
                  function normpath(p,    parts, n, i, m, out, result) {
                    n = split(p, parts, "/")
                    m = 0
                    for (i = 1; i <= n; i++) {
                      if (parts[i] == "..")        { if (m > 0) m-- }
                      else if (parts[i] != "" && parts[i] != ".") { out[++m] = parts[i] }
                    }
                    result = ""
                    for (i = 1; i <= m; i++) result = result (i==1 ? "" : "/") out[i]
                    return result
                  }
                  /^SF:/ { print "SF:" normpath(ws "/" substr($0, 4)); next }
                  { print }
                ' "$lcov" >> coverage/lcov.info
              done
          exit "$fail"

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: coverage/lcov.info
          if-no-files-found: warn
          retention-days: 7

  sonar:
    name: SonarQube Scan
    needs: test
    # Run even when tests fail -- partial coverage is still useful and lets
    # Sonar's quality-gate fire on whatever new code was analysed.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: lcov
          path: coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
