# MANUAL FALLBACK. The automated path is `.github/workflows/release.yml`
# (Changesets "Version Packages PR": merge the version PR -> libs publish). Use
# THIS workflow for a manual rehearsal (dry-run) or recovery of an EXISTING name.
# Both run the same `bun run release` (release-libs.ts), so they cannot conflict:
# npm versions are immutable and the publisher idempotently skips what is live.
#
# This workflow has NO push/tag trigger on purpose: it can ONLY be started by a
# manual `workflow_dispatch`, so it cannot publish anything until a human runs
# it. The default `dry_run: true` makes an accidental dispatch a no-op rehearsal.
#
# OIDC ONLY (no NPM_TOKEN): npm Trusted Publishing needs `id-token: write` and npm
# CLI >= 11.5.1 (node 22 ships an older npm, hence the `npm install -g npm@latest`
# step), and attaches provenance automatically. A trusted publisher is per package
# name and cannot be set before the package exists, so a brand-new name's FIRST
# publish must be done manually by a maintainer (locally, interactive 2FA) once;
# OIDC takes over here afterward. This workflow does not create new names.
#
# One job, not two: `packages/workspace-tools/src/release-libs.ts` (run by `bun run release`) already
# toposorts the 8 Tier-1 packages first and the 7 plugins after them in a single
# idempotent pass, so a `publish-libs` -> `publish-plugins` split would buy no
# extra ordering. The single `publish-packages` job below is the cleaner shape.

name: Release packages (npm)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (auto = next for prereleases, else latest)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - latest
          - next
      dry_run:
        description: "Rehearse without publishing (npm publish --dry-run)"
        required: false
        default: true
        type: boolean

# Never run two real publishes concurrently (npm versions are immutable).
concurrency:
  group: release-packages
  cancel-in-progress: false

jobs:
  publish-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm exchanges for a short-lived publish credential
    steps:
      - uses: actions/checkout@v4

      - id: bun-version
        run: echo "value=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.value }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # >= 22.14.0; resolves to latest 22.x
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1; node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: bun install

      # The publisher does not rely on lifecycle scripts, so build the artifact
      # producers explicitly: the @brika/sdk author CLI bin and the create-brika
      # scaffold both ship prebuilt and must exist before publish.
      - run: bun --filter @brika/sdk run build:bin
      - run: bun --filter create-brika run build

      - run: bun run typecheck

      # OIDC only: no NPM_TOKEN. Relies on npm Trusted Publishing (id-token: write
      # + a trusted publisher configured per package), which also attaches
      # provenance. Cannot create a brand-new name (do that one-time manually).
      - name: Publish libraries and plugins to npm
        # 'auto' passes no --tag, so release-libs.ts derives next (prerelease) / latest.
        run: |
          bun run release -- ${{ inputs.tag != 'auto' && format('--tag={0}', inputs.tag) || '' }} ${{ inputs.dry_run && '--dry-run' || '' }}
