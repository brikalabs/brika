# Automated npm release (Changesets "Version Packages PR" model).
#
# Flow:
#   1. Feature PRs include a changeset (`bun run changeset`).
#   2. On push to main, changesets/action opens/updates a "Version Packages" PR
#      that runs `version-packages` (bumps versions, writes CHANGELOGs via the
#      GitHub formatter, syncs plugin engines, refreshes the lockfile).
#   3. Merging that PR consumes the changesets; the next main run finds none, so
#      the action runs `publish` -> `release-libs.ts` ships the 9 public packages
#      to npm (topo order, idempotent, provenance under GitHub Actions).
#   4. This workflow then tags `v<@brika/sdk version>`, which triggers build.yml
#      (is_release=true) to publish the binary wrappers + the production release.
#
# Publishing is OIDC ONLY (npm Trusted Publishing), no long-lived NPM_TOKEN: the
# stored automation token is exactly what supply-chain worms (Shai-Hulud and kin)
# steal to push trojaned versions, so there is none to steal. OIDC also attaches
# provenance. A trusted publisher is per package NAME and can only be registered
# AFTER the name exists, so each brand-new name needs ONE manual first publish by
# a maintainer (locally, interactive 2FA); OIDC publishes every release thereafter.
#
# Prerequisite (one-time, in repo Settings -> Actions -> General): enable
# "Allow GitHub Actions to create and approve pull requests" so the action can
# open the Version Packages PR with the default GITHUB_TOKEN.

name: Release (npm)

on:
  push:
    branches: [main]

# Never overlap a release with itself (npm versions are immutable; a tag push
# must not race a second publish).
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the version PR branch + push the release tag
      pull-requests: write # open / update the "Version Packages" PR
      id-token: write # mint the OIDC token npm exchanges for a publish credential
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # changesets needs full history to diff against the base

      - id: bun-version
        run: echo "value=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.value }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22 # >= 22.14.0; resolves to latest 22.x
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1; node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: bun install

      # release-libs.ts publishes with --ignore-scripts, so the prebuilt artifacts
      # it ships (the @brika/sdk author CLI bin and the create-brika scaffold) must
      # already exist. Cheap when the publish path does not run.
      - run: bun --filter @brika/sdk run build:bin
      - run: bun --filter create-brika run build

      # OIDC only: no NPM_TOKEN. Publishing relies on npm Trusted Publishing
      # (id-token: write + npm CLI >= 11.5.1 + a trusted publisher configured per
      # package on npmjs.com), which also attaches provenance. A trusted publisher
      # cannot be set before the package exists, so each brand-new name needs ONE
      # manual first publish (locally, by a maintainer) before its OIDC publisher
      # can be configured; thereafter every release publishes via OIDC here.
      - name: Version PR or publish
        id: changesets
        # Pinned by commit SHA (not the mutable @v1 tag): this third-party action
        # runs our version/publish commands with id-token: write, so a hijacked tag
        # could mint an OIDC publish credential. SHA = v1.9.0.
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bun run version-packages
          publish: bun run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On the publish path (a merged Version Packages PR), tag the release so
      # build.yml ships the binary wrappers + the production GitHub release. The
      # tag name IS the version build.yml reads, so @brika/sdk (the fixed-group
      # anchor) defines the release version. Guarded on tag-absence: a normal main
      # push with no version bump leaves the tag in place and does nothing.
      #
      # The tag MUST be pushed with a PAT / App token (RELEASE_PAT), NOT the
      # default GITHUB_TOKEN: tags pushed by the workflow token do not start new
      # workflow runs (GitHub's recursion guard), so build.yml would never fire.
      # If RELEASE_PAT is unset the libs still publish; the step warns and you push
      # the tag by hand to cut the binary release.
      - name: Tag release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION=$(jq -r '.version' packages/sdk/package.json)
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to release."
            exit 0
          fi
          if [ -z "$RELEASE_PAT" ]; then
            echo "::warning title=Binary release not triggered::RELEASE_PAT is not set, so tag $TAG was not pushed. Push it manually to run build.yml (binary wrappers + production release). The npm libraries were still published."
            exit 0
          fi
          git tag "$TAG"
          git push "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git" "$TAG"
          echo "Pushed $TAG -> triggers build.yml (binary wrappers + production release)."
