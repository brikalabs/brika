name: Release Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty to use package.json version)"
        required: false
        type: string
      latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: true
      sync_readme:
        description: "Sync README to Docker Hub"
        required: false
        type: boolean
        default: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repo: ${{ steps.pkg.outputs.repo }}
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get info from package.json
        id: pkg
        run: |
          REPO=$(jq -r '.repository.url' package.json | sed 's|.*github.com/||' | sed 's|\.git$||')
          VERSION=$(jq -r '.version // "0.0.0"' package.json)
          echo "repo=$REPO" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set version
        id: version
        run: |
          VERSION="${{ inputs.version || steps.pkg.outputs.version }}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: |
            ${{ needs.setup.outputs.repo }}:${{ needs.setup.outputs.version }}
            ${{ inputs.latest && format('{0}:latest', needs.setup.outputs.repo) || '' }}
          outputs: type=docker,dest=/tmp/image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  push:
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        run: |
          docker push ${{ needs.setup.outputs.repo }}:${{ needs.setup.outputs.version }}
          if [ "${{ inputs.latest }}" = "true" ]; then
            docker push ${{ needs.setup.outputs.repo }}:latest
          fi

  readme:
    needs: setup
    if: ${{ inputs.sync_readme }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        continue-on-error: true
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD || secrets.DOCKERHUB_TOKEN }}
          repository: ${{ needs.setup.outputs.repo }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
