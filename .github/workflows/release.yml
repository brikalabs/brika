# Publish the npm libraries on a version tag (tag-driven release).
#
# Cutting a release (maintainer, locally):
#   1. bun run version-packages   # changeset version: bump + CHANGELOGs + sync
#                                 # engines + lockfile (uses your local gh token
#                                 # for the GitHub changelog formatter)
#   2. open a normal `chore/...` PR with that diff, review, merge to main
#   3. git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag then triggers BOTH this workflow (the 9 npm libraries) and build.yml
# (the binary wrappers + the GitHub release) - one tag, two publishers, both via
# OIDC. Tags are not covered by the brika-branch-naming ruleset (it targets
# branches), so no repo-setting changes are needed; the version commit rides in
# on an allowed `chore/` branch.
#
# Publishing is OIDC ONLY (npm Trusted Publishing), no long-lived NPM_TOKEN: a
# stored automation token is exactly what supply-chain worms (Shai-Hulud and kin)
# harvest to push trojaned versions, so there is none to steal. OIDC also attaches
# provenance. A trusted publisher is per package NAME and can only be registered
# AFTER the name exists, so each brand-new name needs ONE manual first publish by
# a maintainer (locally, interactive 2FA); OIDC publishes every release thereafter.

name: Release (npm)

on:
  push:
    tags: ["v*"]

# Never overlap a release with itself (npm versions are immutable).
concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # mint the OIDC token npm exchanges for a publish credential
    steps:
      # Actions are SHA-pinned (not mutable major tags): this job holds
      # id-token: write, so a hijacked tag could mint/exfiltrate an OIDC publish
      # credential.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - id: bun-version
        run: echo "value=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ steps.bun-version.outputs.value }}

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22 # >= 22.14.0; resolves to latest 22.x
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm CLI >= 11.5.1; node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: bun install --frozen-lockfile

      # release-libs.ts publishes with --ignore-scripts, so the prebuilt artifacts
      # it ships (the @brika/sdk author CLI bin and the create-brika scaffold) must
      # already exist.
      - run: bun run --filter @brika/sdk build:bin
      - run: bun run --filter create-brika build

      # Publish the 9 libraries in dependency order, idempotently, with provenance
      # (release-libs.ts adds --provenance under GitHub Actions). Versions are the
      # ones the tag was cut from (bumped + merged before tagging).
      - run: bun run release
