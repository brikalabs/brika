name: SonarQube Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: Read Bun version
        id: bun-version
        run: echo "version=$(jq -r '.engines.bun' package.json)" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Run tests with coverage
        run: |
          # Run per-workspace to avoid Bun mock.module() bleed (oven-sh/bun#12823)
          for dir in packages/* apps/* plugins/*; do
            [ -f "$dir/package.json" ] || continue
            test_cmd=$(jq -r '.scripts.test // empty' "$dir/package.json")
            [ -n "$test_cmd" ] || continue
            name=$(jq -r .name "$dir/package.json")
            echo "::group::Testing $name"
            if [ "$test_cmd" = "bun test" ]; then
              (cd "$dir" && bun test --coverage --coverage-reporter=lcov) || true
            else
              (cd "$dir" && bun run test) || true
            fi
            echo "::endgroup::"
          done

          # Merge per-workspace lcov reports — each workspace's lcov uses
          # paths relative to ITS root (`SF:src/...`, `SF:../../packages/...`),
          # so a plain `cat` produces paths Sonar can't resolve against the
          # repo. Rewrite every `SF:` line by prefixing the workspace dir
          # and collapsing any leading `..` segments so the merged report
          # is fully repo-relative.
          mkdir -p coverage
          : > coverage/lcov.info
          find . -path '*/coverage/lcov.info' ! -path './coverage/*' -print0 \
            | while IFS= read -r -d '' lcov; do
                ws=$(dirname "$(dirname "$lcov")")
                ws="${ws#./}"
                awk -v ws="$ws" '
                  function normpath(p,    parts, n, i, m, out, result) {
                    n = split(p, parts, "/")
                    m = 0
                    for (i = 1; i <= n; i++) {
                      if (parts[i] == "..")        { if (m > 0) m-- }
                      else if (parts[i] != "" && parts[i] != ".") { out[++m] = parts[i] }
                    }
                    result = ""
                    for (i = 1; i <= m; i++) result = result (i==1 ? "" : "/") out[i]
                    return result
                  }
                  /^SF:/ { print "SF:" normpath(ws "/" substr($0, 4)); next }
                  { print }
                ' "$lcov" >> coverage/lcov.info
              done
        continue-on-error: true

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
