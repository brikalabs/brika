name: Release Standalone Binaries

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty to use package.json version)"
        required: false
        type: string
      latest:
        description: "Also tag as latest"
        required: false
        type: boolean
        default: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Setup: read version from package.json
  # ─────────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      bun-version: ${{ steps.read.outputs.bun-version }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: read
        run: |
          PKG_VERSION=$(jq -r '.version // "0.0.0"' package.json)
          BUN_VERSION=$(jq -r '.engines.bun' package.json)
          VERSION="${{ inputs.version || '' }}"
          VERSION="${VERSION:-$PKG_VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "bun-version=$BUN_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION  Bun: $BUN_VERSION"

  # ─────────────────────────────────────────────────────────────────────────
  # Build UI (once, shared across all targets)
  # ─────────────────────────────────────────────────────────────────────────
  build-ui:
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build UI
        run: bun run --filter @brika/ui build

      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Build binaries (cross-compile from linux runners where possible)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    needs: [setup, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: brika-linux-x64
            os: ubuntu-latest
            ext: tar.gz

          - target: bun-linux-arm64
            artifact: brika-linux-arm64
            os: ubuntu-latest
            ext: tar.gz

          - target: bun-darwin-x64
            artifact: brika-darwin-x64
            os: macos-latest
            ext: tar.gz

          - target: bun-darwin-arm64
            artifact: brika-darwin-arm64
            os: macos-latest
            ext: tar.gz

          - target: bun-windows-x64
            artifact: brika-windows-x64
            os: ubuntu-latest
            ext: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: apps/ui/dist/

      - name: Compile binary
        working-directory: apps/hub
        run: bun run build --compile --target=${{ matrix.target }}

      # The compiled brika binary already embeds the Bun runtime and uses a
      # --bun-run passthrough for plugin execution, so no separate bun binary
      # is required in the archive.  Plugin package-management (install/add/remove)
      # falls back to `bun` on the user's system PATH.
      - name: Package archive
        run: |
          STAGING="/tmp/brika-staging"
          mkdir -p "$STAGING"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp apps/hub/dist/brika.exe "$STAGING/"
            cp -r apps/ui/dist         "$STAGING/ui"
            cd "$STAGING" && zip -qr "/tmp/${{ matrix.artifact }}.zip" .
          else
            cp apps/hub/dist/brika  "$STAGING/"
            cp -r apps/ui/dist      "$STAGING/ui"
            cd "$STAGING" && tar czf "/tmp/${{ matrix.artifact }}.tar.gz" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # Release: create GitHub release with all platform archives
  # ─────────────────────────────────────────────────────────────────────────
  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: brika-*
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Brika v${VERSION}" \
            --generate-notes \
            ${{ inputs.latest && '--latest' || '' }} \
            artifacts/*
