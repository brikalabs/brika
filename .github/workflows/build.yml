name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'CHANGELOG.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty for package.json version)"
        required: false
        type: string

# Cancel mid-flight canary runs when a fresh commit lands on main, but
# never cancel a tagged release in progress.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────────────────────────────
  # Resolve version, docker tags, and bun version once
  # ───────────────────────────────────────────────────────────────────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      is_release: ${{ steps.meta.outputs.is_release }}
      docker_tags: ${{ steps.meta.outputs.docker_tags }}
      bun_version: ${{ steps.meta.outputs.bun_version }}
    steps:
      - uses: actions/checkout@v5

      - name: Determine build metadata
        id: meta
        run: |
          BUN_VERSION=$(jq -r '.engines.bun' package.json)
          IMAGE="${IMAGE_NAME,,}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IS_RELEASE=true
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            IS_RELEASE=true
          else
            VERSION="canary"
            IS_RELEASE=false
          fi

          if [[ "$IS_RELEASE" == "true" ]]; then
            DOCKER_TAGS="${IMAGE}:${VERSION},${IMAGE}:latest"
          else
            DOCKER_TAGS="${IMAGE}:canary"
          fi

          {
            echo "version=$VERSION"
            echo "is_release=$IS_RELEASE"
            echo "docker_tags=$DOCKER_TAGS"
            echo "bun_version=$BUN_VERSION"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Build Info"
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| Version | \`$VERSION\` |"
            echo "| Release | $IS_RELEASE |"
            echo "| Docker | \`$DOCKER_TAGS\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────────────────────────────
  # Build UI bundle once (shared by every binary in the matrix)
  # ───────────────────────────────────────────────────────────────────────
  build-ui:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}

      - run: bun install --frozen-lockfile

      - run: bun run --filter @brika/ui build

      - uses: actions/upload-artifact@v5
        with:
          name: ui-dist
          path: apps/ui/dist/
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────
  # Cross-compile standalone binaries. Bun's `--compile --target=…`
  # supports any host → any target, so every binary builds on Linux
  # (ubuntu-latest for x64 targets, ubuntu-24.04-arm for arm64).
  #
  # macOS runners are intentionally avoided: `bun build --compile` on
  # `macos-latest` regularly stalls in the bundle step for 8-11 minutes
  # (vs ~5s on Linux) before the concurrency rule kills it, so darwin
  # binaries used to silently never ship. Cross-compiling from Linux
  # produces a byte-identical output and finishes in seconds.
  # ───────────────────────────────────────────────────────────────────────
  binaries:
    needs: [setup, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: bun-linux-x64,    artifact: brika-linux-x64,    os: ubuntu-latest,    ext: tar.gz }
          - { target: bun-linux-arm64,  artifact: brika-linux-arm64,  os: ubuntu-24.04-arm, ext: tar.gz }
          - { target: bun-darwin-x64,   artifact: brika-darwin-x64,   os: ubuntu-latest,    ext: tar.gz }
          - { target: bun-darwin-arm64, artifact: brika-darwin-arm64, os: ubuntu-24.04-arm, ext: tar.gz }
          - { target: bun-windows-x64,  artifact: brika-windows-x64,  os: ubuntu-latest,    ext: zip    }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ needs.setup.outputs.bun_version }}

      - run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v5
        with:
          name: ui-dist
          path: apps/ui/dist/

      - name: Compile binary
        working-directory: apps/build
        run: bun run build --compile --platform=${{ matrix.target }}

      - name: Package archive
        run: |
          STAGING="/tmp/brika-staging"
          mkdir -p "$STAGING"
          if [ "${{ matrix.ext }}" = "zip" ]; then
            cp apps/build/dist/full/brika.exe "$STAGING/"
            cp -r apps/ui/dist                "$STAGING/ui"
            cd "$STAGING" && zip -qr "/tmp/${{ matrix.artifact }}.zip" .
          else
            cp apps/build/dist/full/brika  "$STAGING/"
            cp -r apps/ui/dist             "$STAGING/ui"
            cd "$STAGING" && tar czf "/tmp/${{ matrix.artifact }}.tar.gz" .
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: /tmp/${{ matrix.artifact }}.${{ matrix.ext }}
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────
  # Container image per arch on native runners (no QEMU). The Dockerfile
  # is just a few file COPYs over the prebuilt binary + UI bundle, so
  # each arch lands in ~30s instead of the 8+ minutes the old "bun
  # install + bun build --compile inside docker" pipeline took.
  # ───────────────────────────────────────────────────────────────────────
  docker-arch:
    needs: [setup, binaries]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, src: brika-linux-x64,   os: ubuntu-latest    }
          - { arch: arm64, src: brika-linux-arm64, os: ubuntu-24.04-arm }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: Dockerfile
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v5
        with:
          name: ${{ matrix.src }}
          path: /tmp/brika-bin

      - name: Stage build context
        run: |
          ctx=/tmp/brika-ctx
          mkdir -p "$ctx"
          tar xzf "/tmp/brika-bin/${{ matrix.src }}.tar.gz" -C "$ctx"
          cp Dockerfile "$ctx/"
          ls -la "$ctx"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (digest-only)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: /tmp/brika-ctx
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.setup.outputs.version }}
          cache-from: type=gha,scope=docker-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v5
        with:
          name: docker-digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ───────────────────────────────────────────────────────────────────────
  # Stitch per-arch digests into a multi-arch manifest list and push it
  # under every required tag (canary OR vX.Y.Z + latest).
  # ───────────────────────────────────────────────────────────────────────
  docker-manifest:
    needs: [setup, docker-arch]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: docker-digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push multi-arch manifest
        working-directory: /tmp/digests
        env:
          TAGS: ${{ needs.setup.outputs.docker_tags }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          image="${IMAGE,,}"

          tag_args=""
          IFS=',' read -ra tag_list <<< "${TAGS,,}"
          for t in "${tag_list[@]}"; do
            tag_args+=" -t ${t}"
          done

          ref_args=""
          for d in *; do
            ref_args+=" ${image}@sha256:${d}"
          done

          # shellcheck disable=SC2086
          docker buildx imagetools create ${tag_args} ${ref_args}

      - name: Inspect pushed image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: docker buildx imagetools inspect "${IMAGE,,}:${VERSION}"

  # ───────────────────────────────────────────────────────────────────────
  # Release: collect binaries + write release notes auto-generated from
  # the PRs merged since the previous release.
  # ───────────────────────────────────────────────────────────────────────
  release:
    needs: [setup, docker-manifest, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          pattern: brika-*
          path: artifacts/
          merge-multiple: true

      - name: Generate release-meta.json
        env:
          VERSION: ${{ needs.setup.outputs.version }}
          BUN_VERSION: ${{ needs.setup.outputs.bun_version }}
        run: |
          cd artifacts
          CHECKSUMS=$(for f in brika-*; do
            printf '%s %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$f"
          done | jq -Rn '[inputs | split(" ") | {(.[1]): .[0]}] | add')

          jq -n \
            --arg version "$VERSION" \
            --arg commit "$(git rev-parse HEAD)" \
            --arg branch "$(git rev-parse --abbrev-ref HEAD)" \
            --arg date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg bun "$BUN_VERSION" \
            --argjson checksums "$CHECKSUMS" \
            '{version: $version, commit: $commit, branch: $branch, date: $date, bun: $bun, checksums: $checksums}' \
            > release-meta.json
          cat release-meta.json

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_RELEASE: ${{ needs.setup.outputs.is_release }}
          VERSION: ${{ needs.setup.outputs.version }}
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          # Find the previous published release to diff against. For
          # canary or a tagged release, this is the most recent v* tag
          # other than the one we're about to publish.
          PREV=$(gh release list --exclude-drafts --exclude-pre-releases --limit 10 \
            --json tagName --jq '.[] | select(.tagName != "v'"$VERSION"'") | .tagName' \
            | head -n1)
          echo "previous tag: ${PREV:-<none>}"

          # Use GitHub's release-notes API — same engine the
          # `--generate-notes` flag uses, but callable for non-tag refs
          # so canary gets the same grouped PR summary.
          tag_name="canary"
          [[ "$IS_RELEASE" == "true" ]] && tag_name="v${VERSION}"
          api_args=(-f "tag_name=$tag_name" -f "target_commitish=$GITHUB_SHA")
          [[ -n "$PREV" ]] && api_args+=(-f "previous_tag_name=$PREV")

          AUTO_BODY=$(gh api -X POST \
            "repos/${{ github.repository }}/releases/generate-notes" \
            "${api_args[@]}" --jq .body)

          SHORT_SHA="${GITHUB_SHA:0:7}"
          DATE_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          image_lc="${IMAGE,,}"

          if [[ "$IS_RELEASE" == "true" ]]; then
            HEADER="**Released:** ${DATE_ISO}
          **Commit:** \`${SHORT_SHA}\`
          **Docker:** \`docker pull ${image_lc}:${VERSION}\` · \`docker pull ${image_lc}:latest\`

          ---"
          else
            HEADER="Rolling development build from \`main\` — refreshed on every push.

          **Built:** ${DATE_ISO}
          **Commit:** [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${GITHUB_SHA})
          **Docker:** \`docker pull ${image_lc}:canary\`
          **Diff against:** ${PREV:-<initial>}

          > ⚠ Unstable pre-release — use \`latest\` for production.

          ---"
          fi

          {
            echo "body<<RELEASE_NOTES_EOF"
            printf '%s\n\n%s\n' "$HEADER" "$AUTO_BODY"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create versioned release
        if: needs.setup.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
          BODY: ${{ steps.notes.outputs.body }}
        run: |
          gh release create "v${VERSION}" \
            --title "Brika v${VERSION}" \
            --notes "$BODY" \
            --latest \
            artifacts/*

      - name: Update canary release
        if: needs.setup.outputs.is_release == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BODY: ${{ steps.notes.outputs.body }}
        run: |
          gh release delete canary --yes --cleanup-tag 2>/dev/null || true

          SHORT_SHA="${GITHUB_SHA:0:7}"
          gh release create canary \
            --title "Brika canary (${SHORT_SHA})" \
            --notes "$BODY" \
            --prerelease \
            --target main \
            artifacts/*
