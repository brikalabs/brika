name: Verify Plugins List

on:
  pull_request:
    paths:
      - 'verified-plugins.json'
  push:
    branches:
      - main
    paths:
      - 'verified-plugins.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Verified Plugins

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate JSON schema
        run: |
          # Install ajv-cli for JSON schema validation
          bun add -g ajv-cli

          # Validate against schema
          ajv validate -s verified-plugins-schema.json -d verified-plugins.json

      - name: Check package existence on npm
        run: |
          # Parse plugin names from verified-plugins.json
          PLUGINS=$(bun run -e "
            const data = require('./verified-plugins.json');
            console.log(data.plugins.map(p => p.name).join(' '));
          ")

          echo "Checking plugins: $PLUGINS"

          # Check each plugin exists on npm
          for plugin in $PLUGINS; do
            echo "Checking $plugin..."
            npm view "$plugin" name || {
              echo "❌ Package $plugin not found on npm"
              exit 1
            }
          done

          echo "✅ All plugins exist on npm"

      - name: Verify @brika/sdk dependency
        run: |
          # Check that each plugin depends on @brika/sdk (required for all plugins)
          PLUGINS=$(bun run -e "
            const data = require('./verified-plugins.json');
            console.log(data.plugins.map(p => p.name).join(' '));
          ")

          for plugin in $PLUGINS; do
            echo "Checking dependencies for $plugin..."

            # Check both dependencies and peerDependencies
            DEPS=$(npm view "$plugin" dependencies --json 2>/dev/null || echo "{}")
            PEER_DEPS=$(npm view "$plugin" peerDependencies --json 2>/dev/null || echo "{}")

            if echo "$DEPS" | grep -q "@brika/sdk"; then
              SDK_VERSION=$(echo "$DEPS" | grep -o '"@brika/sdk"[^}]*' | grep -o ':[^,}]*' | tr -d ': "')
              echo "✅ $plugin depends on @brika/sdk ($SDK_VERSION)"
            elif echo "$PEER_DEPS" | grep -q "@brika/sdk"; then
              SDK_VERSION=$(echo "$PEER_DEPS" | grep -o '"@brika/sdk"[^}]*' | grep -o ':[^,}]*' | tr -d ': "')
              echo "✅ $plugin has @brika/sdk as peer dependency ($SDK_VERSION)"
            else
              echo "❌ $plugin missing @brika/sdk dependency"
              echo "   This is required for all Brika plugins"
              exit 1
            fi
          done

          echo "✅ All plugins depend on @brika/sdk"

      - name: Verify brika-plugin keyword (optional but recommended)
        run: |
          # Check that each plugin has the 'brika-plugin' keyword (for discoverability)
          PLUGINS=$(bun run -e "
            const data = require('./verified-plugins.json');
            console.log(data.plugins.map(p => p.name).join(' '));
          ")

          for plugin in $PLUGINS; do
            echo "Checking keywords for $plugin..."
            KEYWORDS=$(npm view "$plugin" keywords --json || echo "[]")

            if echo "$KEYWORDS" | grep -q "brika-plugin"; then
              echo "✅ $plugin has 'brika-plugin' keyword"
            else
              echo "⚠️  Warning: $plugin missing 'brika-plugin' keyword"
              echo "   This is recommended for better discoverability in npm search"
            fi
          done

      - name: Check engines.brika field
        run: |
          # Verify each plugin has engines.brika field
          PLUGINS=$(bun run -e "
            const data = require('./verified-plugins.json');
            console.log(data.plugins.map(p => p.name).join(' '));
          ")

          for plugin in $PLUGINS; do
            echo "Checking engines.brika for $plugin..."
            ENGINES=$(npm view "$plugin" engines.brika || echo "")

            if [ -z "$ENGINES" ]; then
              echo "⚠️  Warning: $plugin missing engines.brika field"
              echo "   This may cause compatibility issues"
            else
              echo "✅ $plugin has engines.brika: $ENGINES"
            fi
          done

      - name: Update lastUpdated timestamp
        if: github.event_name == 'pull_request'
        run: |
          # Update lastUpdated to current timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Use bun to update the JSON file
          bun run -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('./verified-plugins.json', 'utf8'));
            data.lastUpdated = '$TIMESTAMP';
            fs.writeFileSync('./verified-plugins.json', JSON.stringify(data, null, 2) + '\n');
          "

          # Check if file changed
          if git diff --quiet verified-plugins.json; then
            echo "No timestamp update needed"
          else
            echo "Updated lastUpdated to $TIMESTAMP"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add verified-plugins.json
            git commit -m "chore: update lastUpdated timestamp"
            echo "::notice::Updated lastUpdated timestamp to $TIMESTAMP"
          fi

      - name: Summary
        if: success()
        run: |
          echo "### ✅ Validation Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All plugins in the verified list have been validated:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- JSON schema is valid" >> $GITHUB_STEP_SUMMARY
          echo "- All packages exist on npm" >> $GITHUB_STEP_SUMMARY
          echo "- All packages have the 'brika-plugin' keyword" >> $GITHUB_STEP_SUMMARY
          echo "- Engines.brika fields checked" >> $GITHUB_STEP_SUMMARY
