name = "brika"
main = "worker.ts"
compatibility_date = "2024-01-01"

# Schema CDN Configuration
[vars]
NPM_PACKAGE = "@brika/schema"
SCHEMAS_PATH = "/dist"
CDN_PROVIDER = "unpkg"  # Options: "unpkg" or "jsdelivr"
CACHE_MAX_AGE = 3600

[env.production]
routes = [
  { pattern = "schema.brika.dev/*", custom_domain = true }
]

