<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRIKA</title>
    <meta
      name="description"
      content="BRIKA — the remote-access shell for your home hub. Open hub.brika.dev/&lt;name&gt; to connect."
    />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 240 240' fill='none'%3E%3Crect width='240' height='240' rx='65' fill='black'/%3E%3Cpath d='M119 60.893C119 58.206 119 56.862 119.143 55.734C120.177 47.59 126.59 41.177 134.734 40.143C135.862 40 137.206 40 139.893 40H146C166.987 40 184 57.013 184 78S166.987 116 146 116H139.893C137.206 116 135.862 116 134.734 115.857C126.59 114.823 120.177 108.41 119.143 100.266C119 99.137 119 97.794 119 95.107V60.893Z' fill='white'/%3E%3Cpath d='M119 148.107C119 142.427 119 139.587 119.635 137.26C121.313 131.114 126.114 126.313 132.26 124.635C134.587 124 137.427 124 143.107 124H156C176.987 124 194 141.013 194 162S176.987 200 156 200H143.107C137.427 200 134.587 200 132.26 199.365C126.114 197.687 121.313 192.886 119.635 186.74C119 184.413 119 181.573 119 175.893V148.107Z' fill='white'/%3E%3Crect x='63' y='152' width='48' height='48' rx='18' fill='white'/%3E%3Crect x='63' y='96' width='48' height='48' rx='18' fill='white'/%3E%3Crect x='63' y='40' width='48' height='48' rx='18' fill='white'/%3E%3C/svg%3E"
    />
    <style>
      :root {
              color-scheme: light dark;
              --brika-bg: #fafaf9;
              --brika-fg: #18181b;
              --brika-mark-bg: #18181b;
              --brika-mark-fg: #fafafa;
              --brika-muted: rgba(24, 24, 27, 0.55);
              --brika-border: rgba(24, 24, 27, 0.12);
              --brika-input-bg: rgba(255, 255, 255, 0.6);
              --brika-error: #b91c1c;
              --brika-accent: #f97316;
            }
            @media (prefers-color-scheme: dark) {
              :root {
                --brika-bg: #0a0a0a;
                --brika-fg: #fafafa;
                --brika-mark-bg: #fafafa;
                --brika-mark-fg: #18181b;
                --brika-muted: rgba(250, 250, 250, 0.55);
                --brika-border: rgba(250, 250, 250, 0.12);
                --brika-input-bg: rgba(255, 255, 255, 0.04);
                --brika-error: #fca5a5;
                --brika-accent: #fb923c;
              }
            }

            *,
            *::before,
            *::after {
              box-sizing: border-box;
            }

            html,
            body {
              margin: 0;
              padding: 0;
              min-height: 100%;
              background: var(--brika-bg);
              color: var(--brika-fg);
              font-family:
                ui-sans-serif,
                system-ui,
                -apple-system,
                'Segoe UI',
                Roboto,
                sans-serif;
              -webkit-font-smoothing: antialiased;
            }

            /* Soft animated gradient backdrop. Pure CSS, no images. */
            body::before {
              content: '';
              position: fixed;
              inset: -20%;
              background:
                radial-gradient(ellipse 40% 30% at 20% 30%, color-mix(in srgb, var(--brika-accent) 12%, transparent), transparent 60%),
                radial-gradient(ellipse 30% 20% at 80% 70%, color-mix(in srgb, var(--brika-mark-bg) 8%, transparent), transparent 60%);
              filter: blur(60px);
              z-index: -2;
              animation: brika-aurora 16s ease-in-out infinite alternate;
              pointer-events: none;
            }

            @keyframes brika-aurora {
              0%   { transform: translate3d(-3%, -2%, 0) scale(1); }
              50%  { transform: translate3d(3%, 2%, 0) scale(1.05); }
              100% { transform: translate3d(-2%, 3%, 0) scale(1); }
            }

            #brika-bootstrap {
              position: fixed;
              inset: 0;
              display: grid;
              place-items: center;
              padding: 24px;
            }

            .brika-card {
              max-width: 420px;
              text-align: center;
            }

            /* ─── Mark ─────────────────────────────────────────────────────────── */

            .brika-mark {
              width: 92px;
              height: 92px;
              margin: 0 auto 24px;
              border-radius: 26px;
              background: var(--brika-mark-bg);
              display: grid;
              place-items: center;
              position: relative;
            }
            .brika-mark::after {
              content: '';
              position: absolute;
              inset: -6px;
              border-radius: 32px;
              background: var(--brika-mark-bg);
              z-index: -1;
              /* Hidden by default — the loading keyframes raise opacity to
                 0.12–0.36 while pulsing. When animation is suppressed
                 (landing / error / reduced-motion) the halo stays invisible,
                 so the mark's apparent size is identical across all phases. */
              opacity: 0;
              filter: blur(12px);
              animation: brika-glow 2.4s ease-in-out infinite;
            }
            .brika-mark svg {
              width: 56px;
              height: 56px;
              color: var(--brika-mark-fg);
              overflow: visible;
            }

            /*
             * Each shape runs TWO animations:
             *   1. `brika-build` — one-shot snap-in on first paint. Staggered so the
             *      bricks stack bottom-up and the "B/R" pieces slot in last.
             *   2. `brika-shimmer` — indefinite cascade. After the build settles,
             *      a soft pulse travels through the shapes in the same order, so
             *      the logo keeps reading as "loading" without spinning anything.
             *
             * `transform-box: fill-box` + `transform-origin: center` make scales
             * happen around each shape's own midpoint (not the SVG origin).
             */
            .brika-shape {
              opacity: 0;
              transform: translate3d(0, 12px, 0) scale(0.7);
              transform-box: fill-box;
              transform-origin: center;
              animation-name: brika-build, brika-shimmer;
              animation-duration: 0.55s, 1.8s;
              animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1), ease-in-out;
              animation-iteration-count: 1, infinite;
              animation-fill-mode: forwards, none;
              /* When animation is removed (error / landing / reduced-motion)
                 the shape's properties snap back to its declared state. This
                 transition smooths that snap so the bricks visibly settle
                 into place rather than freezing mid-shimmer. */
              transition: opacity 0.3s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            /* Animation delays are pairs: <build-delay>, <shimmer-delay>.
             * Shimmer starts ~0.8 s after the build finishes for each shape, so
             * there's a brief settle before the loop begins. The same stagger
             * order (bottom-brick → top-brick → B → R) repeats, so the shimmer
             * reads as a wave climbing the mark. */
            .brika-l-3   { animation-delay: 0.00s, 1.10s; }
            .brika-l-2   { animation-delay: 0.10s, 1.22s; }
            .brika-l-1   { animation-delay: 0.20s, 1.34s; }
            .brika-r-top { animation-delay: 0.35s, 1.50s; }
            .brika-r-bot { animation-delay: 0.45s, 1.62s; }

            @keyframes brika-build {
              to {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
              }
            }

            @keyframes brika-shimmer {
              0%, 70%, 100% {
                opacity: 1;
                transform: translate3d(0, 0, 0) scale(1);
              }
              35% {
                opacity: 0.28;
                transform: translate3d(0, -3px, 0) scale(0.88);
              }
            }

            @keyframes brika-glow {
              0%, 100% {
                opacity: 0.12;
                filter: blur(12px);
              }
              50% {
                opacity: 0.36;
                filter: blur(20px);
              }
            }

            /*
             * Error: the mark stays in its normal color (less alarming than a full
             * red fill), animations freeze in place, and one brick — the top-left
             * — drops down and dims, suggesting "something fell off the stack."
             * The red status dot in the corner is what carries the alarm.
             */
            #brika-bootstrap[data-brika-phase='error'] .brika-mark::after,
            #brika-bootstrap[data-brika-phase='error'] .brika-shape {
              animation: none;
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-shape {
              opacity: 1;
              transform: none;
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-l-1 {
              opacity: 0.25;
              transform: translate3d(-3px, 6px, 0) rotate(-8deg);
              /* Let the other shapes settle (~0.3 s) first, then the top
                 brick tips off the stack. The cubic-bezier overshoot gives
                 the fall a physical feel. */
              transition:
                opacity 0.5s ease 0.3s,
                transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
            }
            .brika-status-dot {
              position: absolute;
              top: -4px;
              right: -4px;
              width: 16px;
              height: 16px;
              border-radius: 50%;
              background: var(--brika-error);
              border: 3px solid var(--brika-bg);
              opacity: 0;
              transform: scale(0);
              transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-status-dot {
              opacity: 1;
              transform: scale(1);
              animation: brika-dot-pulse 1.8s ease-in-out infinite;
              animation-delay: 0.3s;
            }
            @keyframes brika-dot-pulse {
              0%, 100% {
                box-shadow: 0 0 0 0 color-mix(in srgb, var(--brika-error) 50%, transparent);
              }
              50% {
                box-shadow: 0 0 0 8px color-mix(in srgb, var(--brika-error) 0%, transparent);
              }
            }

            /* Landing state: no shimmer either, just the static logo. */
            #brika-bootstrap[data-brika-phase='landing'] .brika-mark::after,
            #brika-bootstrap[data-brika-phase='landing'] .brika-shape {
              animation: none;
            }
            #brika-bootstrap[data-brika-phase='landing'] .brika-shape {
              opacity: 1;
              transform: none;
            }

            /* ─── Status text ──────────────────────────────────────────────────── */

            .brika-wordmark {
              font-size: 22px;
              font-weight: 600;
              letter-spacing: -0.02em;
              margin: 0 0 6px;
              display: none;
            }
            .brika-tagline {
              font-size: 13.5px;
              color: var(--brika-muted);
              margin: 0 0 20px;
              line-height: 1.5;
              display: none;
            }
            .brika-status {
              font-size: 14px;
              font-weight: 500;
              margin: 0 0 6px;
              letter-spacing: -0.01em;
              opacity: 0;
              animation: brika-fade-in 0.5s ease-out 0.7s forwards;
            }
            .brika-detail {
              font-size: 12px;
              color: var(--brika-muted);
              margin: 0;
              font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
              word-break: break-all;
              min-height: 1em;
              opacity: 0;
              animation: brika-fade-in 0.5s ease-out 0.9s forwards;
            }
            @keyframes brika-fade-in {
              to { opacity: 1; }
            }

            /* ─── Error card ───────────────────────────────────────────────────── */

            .brika-error-card {
              display: none;
              text-align: center;
              margin-top: 4px;
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-status,
            #brika-bootstrap[data-brika-phase='error'] .brika-detail {
              display: none;
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-error-card {
              display: block;
              animation: brika-fade-in 0.4s ease-out forwards;
            }
            .brika-error-title {
              font-size: 16px;
              font-weight: 600;
              margin: 0 0 8px;
              letter-spacing: -0.01em;
              color: var(--brika-fg);
            }
            .brika-error-detail {
              font-size: 13.5px;
              color: var(--brika-muted);
              margin: 0 0 20px;
              line-height: 1.5;
              max-width: 340px;
              margin-left: auto;
              margin-right: auto;
            }
            .brika-error-actions {
              display: flex;
              gap: 8px;
              justify-content: center;
              flex-wrap: wrap;
            }
            .brika-error-actions .brika-button {
              padding: 9px 16px;
            }
            .brika-error-secondary {
              padding: 9px 16px;
              font: inherit;
              font-size: 13px;
              font-weight: 500;
              color: var(--brika-fg);
              background: transparent;
              border: 1px solid var(--brika-border);
              border-radius: 10px;
              cursor: pointer;
              transition: background 0.15s ease;
              text-decoration: none;
              display: inline-flex;
              align-items: center;
            }
            .brika-error-secondary:hover {
              background: var(--brika-input-bg);
            }
            .brika-error-retry {
              font-size: 12px;
              color: var(--brika-muted);
              margin: 16px 0 0;
              min-height: 1em;
              font-variant-numeric: tabular-nums;
            }
            .brika-error-retry[data-active='1']::before {
              content: '';
              display: inline-block;
              width: 6px;
              height: 6px;
              border-radius: 50%;
              background: var(--brika-muted);
              margin-right: 6px;
              vertical-align: middle;
              animation: brika-dot-pulse 1.8s ease-in-out infinite;
            }

            /* ─── Landing form (shown when no hub name is in the URL) ─────────── */

            .brika-landing {
              display: none;
              text-align: left;
            }
            #brika-bootstrap[data-brika-phase='landing'] .brika-wordmark,
            #brika-bootstrap[data-brika-phase='landing'] .brika-tagline,
            #brika-bootstrap[data-brika-phase='landing'] .brika-landing {
              display: block;
            }
            #brika-bootstrap[data-brika-phase='landing'] .brika-status,
            #brika-bootstrap[data-brika-phase='landing'] .brika-detail {
              display: none;
            }
            #brika-bootstrap[data-brika-phase='landing'] .brika-card {
              text-align: center;
            }

            .brika-form {
              margin: 16px auto 12px;
              display: flex;
              gap: 8px;
              max-width: 360px;
              padding: 6px;
              background: var(--brika-input-bg);
              border: 1px solid var(--brika-border);
              border-radius: 14px;
              backdrop-filter: blur(8px);
              -webkit-backdrop-filter: blur(8px);
              transition: border-color 0.15s ease;
            }
            .brika-form:focus-within {
              border-color: color-mix(in srgb, var(--brika-fg) 35%, transparent);
            }
            .brika-prefix {
              align-self: center;
              padding-left: 10px;
              font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
              font-size: 13px;
              color: var(--brika-muted);
            }
            .brika-input {
              flex: 1;
              min-width: 0;
              border: 0;
              background: transparent;
              font: inherit;
              font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
              font-size: 13px;
              color: var(--brika-fg);
              padding: 8px 4px;
              outline: none;
            }
            .brika-input::placeholder {
              color: color-mix(in srgb, var(--brika-muted) 70%, transparent);
            }
            .brika-button {
              padding: 8px 14px;
              font: inherit;
              font-size: 13px;
              font-weight: 500;
              color: var(--brika-mark-fg);
              background: var(--brika-mark-bg);
              border: 0;
              border-radius: 10px;
              cursor: pointer;
              transition: opacity 0.15s ease, transform 0.1s ease;
            }
            .brika-button:hover {
              opacity: 0.88;
            }
            .brika-button:active {
              transform: scale(0.97);
            }
            .brika-button:disabled {
              opacity: 0.35;
              cursor: not-allowed;
            }
            .brika-form-error {
              font-size: 12px;
              color: var(--brika-error);
              margin: 4px 0 0;
              min-height: 1em;
            }
            .brika-footer {
              margin-top: 28px;
              font-size: 12.5px;
              color: var(--brika-muted);
              display: flex;
              gap: 16px;
              justify-content: center;
              flex-wrap: wrap;
            }
            .brika-footer a {
              color: inherit;
              text-decoration: none;
              border-bottom: 1px dotted color-mix(in srgb, var(--brika-muted) 50%, transparent);
              transition: color 0.15s ease, border-color 0.15s ease;
            }
            .brika-footer a:hover {
              color: var(--brika-fg);
              border-bottom-color: var(--brika-fg);
            }

            /* ─── Reduced motion ───────────────────────────────────────────────── */
            @media (prefers-reduced-motion: reduce) {
              body::before,
              .brika-shape,
              .brika-status,
              .brika-detail,
              .brika-mark::after {
                animation: none !important;
              }
              .brika-shape,
              .brika-status,
              .brika-detail {
                opacity: 1 !important;
                transform: none !important;
              }
            }
    </style>
  </head>
  <body>
    <div id="brika-bootstrap" data-brika-phase="connecting">
      <div class="brika-card">
        <div class="brika-mark" aria-hidden="true">
          <span class="brika-status-dot" aria-hidden="true"></span>
          <svg viewBox="0 0 240 240" fill="currentColor">
            <!-- "B" upper and "R" lower — slotted in last to read as the name being completed. -->
            <path
              class="brika-shape brika-r-top"
              d="M119 60.893C119 58.206 119 56.862 119.143 55.734C120.177 47.59 126.59 41.177 134.734 40.143C135.862 40 137.206 40 139.893 40H146C166.987 40 184 57.013 184 78S166.987 116 146 116H139.893C137.206 116 135.862 116 134.734 115.857C126.59 114.823 120.177 108.41 119.143 100.266C119 99.137 119 97.794 119 95.107V60.893Z"
            />
            <path
              class="brika-shape brika-r-bot"
              d="M119 148.107C119 142.427 119 139.587 119.635 137.26C121.313 131.114 126.114 126.313 132.26 124.635C134.587 124 137.427 124 143.107 124H156C176.987 124 194 141.013 194 162S176.987 200 156 200H143.107C137.427 200 134.587 200 132.26 199.365C126.114 197.687 121.313 192.886 119.635 186.74C119 184.413 119 181.573 119 175.893V148.107Z"
            />
            <!-- Three left bricks, stacked bottom-up so the build reads as construction. -->
            <rect class="brika-shape brika-l-3" x="63" y="152" width="48" height="48" rx="18" />
            <rect class="brika-shape brika-l-2" x="63" y="96" width="48" height="48" rx="18" />
            <rect class="brika-shape brika-l-1" x="63" y="40" width="48" height="48" rx="18" />
          </svg>
        </div>

        <!-- Connecting / loading view -->
        <p class="brika-status" data-brika-status>Connecting to your hub…</p>
        <p class="brika-detail" data-brika-detail></p>

        <!-- Error view — populated by bootstrap.ts when something fails -->
        <div class="brika-error-card" role="alert">
          <h2 class="brika-error-title" data-brika-error-title>Couldn't reach your hub</h2>
          <p class="brika-error-detail" data-brika-error-detail></p>
          <div class="brika-error-actions">
            <button type="button" class="brika-button" data-brika-error-primary>Try again</button>
            <a href="/" class="brika-error-secondary" data-brika-error-secondary>Different hub</a>
          </div>
          <p class="brika-error-retry" data-brika-error-retry></p>
        </div>

        <!-- Landing view (no hub name in URL) -->
        <h1 class="brika-wordmark">BRIKA</h1>
        <p class="brika-tagline">
          The remote-access shell for your home hub. Enter your hub name to connect.
        </p>
        <div class="brika-landing">
          <form class="brika-form" data-brika-form>
            <span class="brika-prefix" aria-hidden="true">hub.brika.dev/</span>
            <input
              type="text"
              class="brika-input"
              data-brika-input
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              autofocus
              pattern="[a-z][a-z0-9-]{2,30}[a-z0-9]"
              maxlength="32"
              placeholder="your-hub"
              aria-label="Hub name"
            />
            <button type="submit" class="brika-button" data-brika-submit>Connect</button>
          </form>
          <p class="brika-form-error" data-brika-form-error></p>
          <nav class="brika-footer">
            <a href="https://brika.dev" rel="noopener">brika.dev</a>
            <a href="https://github.com/brikalabs/brika" rel="noopener">GitHub</a>
            <a href="https://brika.dev/docs/remote-access" rel="noopener">Set up remote access</a>
          </nav>
        </div>
      </div>
    </div>
    <script type="module" src="./bootstrap.js"></script>
  </body>
</html>
