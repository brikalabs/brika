<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BRIKA</title>
    <link

      type="image/svg+xml"

    />
    <style>
      /* Apply persisted theme synchronously so the splash doesn't flash. */
            :root {
              color-scheme: light dark;
            }
            html,
            body {
              margin: 0;
              padding: 0;
              min-height: 100%;
              background: #fafaf9;
              color: #18181b;
              font-family:
                ui-sans-serif,
                system-ui,
                -apple-system,
                'Segoe UI',
                Roboto,
                sans-serif;
            }
            @media (prefers-color-scheme: dark) {
              html,
              body {
                background: #0a0a0a;
                color: #fafafa;
              }
            }
            #brika-bootstrap {
              position: fixed;
              inset: 0;
              display: grid;
              place-items: center;
              padding: 24px;
            }
            .brika-card {
              max-width: 380px;
              text-align: center;
            }
            .brika-mark {
              width: 64px;
              height: 64px;
              margin: 0 auto 20px;
              border-radius: 18px;
              background: #18181b;
              display: grid;
              place-items: center;
            }
            @media (prefers-color-scheme: dark) {
              .brika-mark {
                background: #fafafa;
              }
            }
            .brika-mark svg {
              width: 36px;
              height: 36px;
              color: #fafafa;
            }
            @media (prefers-color-scheme: dark) {
              .brika-mark svg {
                color: #18181b;
              }
            }
            .brika-status {
              font-size: 14px;
              font-weight: 500;
              margin: 0 0 6px;
            }
            .brika-detail {
              font-size: 12.5px;
              opacity: 0.6;
              margin: 0;
              font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
              word-break: break-all;
            }
            .brika-spinner {
              width: 18px;
              height: 18px;
              margin: 0 auto 14px;
              border: 2px solid currentColor;
              border-right-color: transparent;
              border-radius: 50%;
              animation: brika-spin 0.7s linear infinite;
              opacity: 0.45;
            }
            @keyframes brika-spin {
              to {
                transform: rotate(360deg);
              }
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-spinner {
              display: none;
            }
            #brika-bootstrap[data-brika-phase='error'] .brika-status {
              color: #b91c1c;
            }
            @media (prefers-color-scheme: dark) {
              #brika-bootstrap[data-brika-phase='error'] .brika-status {
                color: #fca5a5;
              }
            }
    </style>
  </head>
  <body>
    <div id="brika-bootstrap" data-brika-phase="connecting">
      <div class="brika-card">
        <div class="brika-mark" aria-hidden="true">
          <svg viewBox="0 0 240 240" fill="currentColor">
            <path
              d="M119 60.893C119 58.206 119 56.862 119.143 55.734C120.177 47.59 126.59 41.177 134.734 40.143C135.862 40 137.206 40 139.893 40H146C166.987 40 184 57.013 184 78S166.987 116 146 116H139.893C137.206 116 135.862 116 134.734 115.857C126.59 114.823 120.177 108.41 119.143 100.266C119 99.137 119 97.794 119 95.107V60.893Z"
            />
            <path
              d="M119 148.107C119 142.427 119 139.587 119.635 137.26C121.313 131.114 126.114 126.313 132.26 124.635C134.587 124 137.427 124 143.107 124H156C176.987 124 194 141.013 194 162S176.987 200 156 200H143.107C137.427 200 134.587 200 132.26 199.365C126.114 197.687 121.313 192.886 119.635 186.74C119 184.413 119 181.573 119 175.893V148.107Z"
            />
            <rect x="63" y="152" width="48" height="48" rx="18" />
            <rect x="63" y="96" width="48" height="48" rx="18" />
            <rect x="63" y="40" width="48" height="48" rx="18" />
          </svg>
        </div>
        <div class="brika-spinner" aria-hidden="true"></div>
        <p class="brika-status" data-brika-status>Connecting to your hub…</p>
        <p class="brika-detail" data-brika-detail></p>
      </div>
    </div>
    <script type="module" src="./bootstrap.js"></script>
  </body>
</html>
