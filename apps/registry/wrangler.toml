name = "brika-registry"
main = "worker.ts"
compatibility_date = "2024-01-01"

# Registry CDN Configuration
[vars]
CACHE_MAX_AGE = 3600  # Cache max age in seconds (1 hour)
REGISTRY_FILE = "verified-plugins.json"

[env.production]
routes = [
  { pattern = "registry.brika.dev/*", custom_domain = true }
]
