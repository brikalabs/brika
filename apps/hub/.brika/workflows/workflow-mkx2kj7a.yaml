  - id: spark-receiver-mkx3s1pv-3
    type: "@brika/blocks-builtin:spark-receiver"
    position:
      x: 268
      y: 66
    config:
      sparkType: "@brika/plugin-example-echo:echoed"
    outputs:
      out: merge-mkx3rc1c-1:b
  - id: end-mkx3sfe1-4
    type: "@brika/blocks-builtin:end"
    position:
      x: 77
      y: 423
    inputs:
      in: merge-mkx3rc1c-1:out
