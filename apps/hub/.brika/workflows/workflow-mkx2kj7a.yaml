version: "1"
workspace:
  id: workflow-mkx2kj7a
  name: New Workflow
  enabled: true
plugins:
  "@brika/blocks-builtin": 0.2.1
blocks:
  - id: merge-mkx3rc1c-1
    type: "@brika/blocks-builtin:merge"
    position:
      x: 105
      y: 244
    inputs:
      a: clock-mkx3rr5j-2:tick
      b: spark-receiver-mkx3s1pv-3:out
    outputs:
      out: end-mkx3sfe1-4:in
  - id: clock-mkx3rr5j-2
