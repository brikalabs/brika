version: "1"
board:
  id: home
  name: Home
  icon: cat
  columns: 12
bricks:
  - instanceId: inst-mlceac1o-1
    type: "@brika/plugin-timer:weather"
    config:
      unit: celsius
      refreshInterval: 5
    position:
      x: 2
      y: 2
    size:
      w: 2
      h: 1
  - instanceId: inst-mlceag6e-2
    type: "@brika/plugin-timer:photo"
    config:
      interval: 10
      autoRotate: false
    position:
      x: 4
      y: 0
    size:
      w: 3
      h: 3
  - instanceId: inst-mlceut6e-1
    type: "@brika/plugin-timer:weather"
    config:
      unit: celsius
    position:
      x: 0
      y: 3
    size:
      w: 7
      h: 1
  - instanceId: inst-mlcfrplo-1
    type: "@brika/plugin-timer:camera"
    config:
      muted: true
      defaultStream: Elephants Dream
    position:
      x: 0
      y: 0
    size:
      w: 2
      h: 3
  - instanceId: inst-mlcjxofq-1
    type: "@brika/plugin-timer:photo"
    config:
      autoRotate: false
    position:
      x: 2
      y: 0
    size:
      w: 2
      h: 2
