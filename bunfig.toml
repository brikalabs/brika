# Root Bun configuration
# https://bun.sh/docs/runtime/bunfig

[test]
# Exclude frontend and other non-testable code from coverage
coverageSkipSourceFiles = [
  "apps/ui/**/*",
  "apps/docs/**/*",
  "apps/schema-cdn/**/*",
  "**/node_modules/**/*",
  "**/*.d.ts"
]
# Floor enforced in CI. Lift gradually as packages add coverage —
# see TESTING.md for the policy and the list of packages exempted
# from the global gate (apps/ui, apps/docs).
coverageThreshold = 0.70
